spring:
  application:
    name: incident-manager
  datasource:
    url: jdbc:postgresql://localhost:5440/incident_manager
    username: user
    password: password
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: localhost:9092
    template:
      observation-enabled: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    metrics:
      export:
        enabled: false
    tracing:
      export:
        enabled: false

app:
  kafka:
    incidents-topic: incidents
  jwt:
    secret: ${JWT_SECRET:3f9a1c7e5b2d8460f1a3c6e9b4d7028fa5c1e8b3d6f90a2c4e7b1d5a8c3f6e0b2}
